<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <link rel="stylesheet" href="/src/sidebar.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri App</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>
  <body>
    <!-- 顶部标题栏（全宽，覆盖最顶层） -->
    <header class="app-header">
      <div class="app-header-left">
        <!-- 文件菜单 -->
        <div class="menu-dropdown">
          <button class="menu-trigger" type="button">文件</button>
          <div class="menu-panel">
            <div class="menu-item" id="menu-new-project">打开/新建项目</div>
            <div class="menu-item" id="menu-save-project">保存当前项目</div>
            <div class="menu-item" id="menu-export-project">导出当前项目</div>
          </div>
        </div>
        <!-- 帮助菜单 -->
        <div class="menu-dropdown">
          <button class="menu-trigger">帮助</button>
          <div class="menu-panel">
            <div class="menu-item">说明书</div>
          </div>
        </div>
      </div>
      <!-- 拖拽区域（中间空白部分） -->
      <div class="header-drag-region" id="header-drag-region"></div>
      <div class="app-header-right">
        <!-- 主题切换图标 -->
        <div class="header-btn" id="header-theme" title="切换主题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </div>
        <!-- 设置图标 -->
        <div class="header-btn" id="header-settings" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="header-sep"></div>
        <div class="header-btn" id="header-minimize" title="最小化">
          <svg viewBox="0 0 16 16" fill="currentColor"><rect x="3" y="7.5" width="10" height="1.5" rx="0.5"/></svg>
        </div>
        <div class="header-btn" id="header-maximize" title="最大化">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2.5" y="2.5" width="11" height="11" rx="1"/></svg>
        </div>
        <div class="header-btn header-btn-close" id="header-close" title="关闭">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4l8 8M12 4l-8 8"/></svg>
        </div>
      </div>
    </header>
    <!-- 侧边栏 -->
    <nav id="sidebar">
      <div class="sidebar-top">
        <button class="sidebar-create-btn" title="打开/新建项目" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-divider"></div>
      <div class="sidebar-chat-list"></div>
      <div class="sidebar-bottom">
        <button class="sidebar-toggle-btn" title="展开侧边栏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
      </div>
    </nav>
    <!-- 主内容区 -->
    <main id="main-content">
      <!-- 无限画布容器 -->
      <div id="canvas-container">
        <!-- 画布文件预览卡片 -->
        <div id="canvas-file-card" style="display:none;">
          <div class="canvas-file-header">
            <span class="canvas-file-title" id="canvas-file-title">文件预览</span>
            <span class="canvas-file-time" id="canvas-file-time">未生成</span>
          </div>
          <button class="canvas-file-update" id="canvas-file-update" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            <span>更新</span>
          </button>
        </div>
        <!-- 草稿工具箱（悬浮在目录卡片右侧） -->
        <div id="draft-toolbox">
          <div class="draft-toolbox-tabs">
            <button class="draft-toolbox-tab active" data-tab="basic" type="button">基础</button>
            <button class="draft-toolbox-tab" data-tab="brush" type="button">画笔</button>
            <button class="draft-toolbox-tab" data-tab="ui" type="button">UI</button>
            <button class="draft-toolbox-tab" data-tab="tools" type="button">工具</button>
          </div>
          <div class="draft-toolbox-panels">
            <!-- 基础页签 -->
            <div class="draft-toolbox-panel active" data-panel="basic">
              <button class="draft-tool" data-tool="note" title="便签">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/></svg>
                <span>便签</span>
              </button>
              <button class="draft-tool" data-tool="mini-canvas" title="小画布">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
                <span>小画布</span>
              </button>
              <button class="draft-tool" data-tool="line" title="连线">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
                <span>连线</span>
              </button>
              <button class="draft-tool" data-tool="arrow" title="箭头">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="12 5 19 5 19 12"/></svg>
                <span>箭头</span>
              </button>
            </div>
            <!-- 画笔页签 -->
            <div class="draft-toolbox-panel" data-panel="brush">
              <button class="draft-tool active" data-tool="ballpen" title="圆珠笔">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/><circle cx="11" cy="11" r="2"/></svg>
                <span>圆珠笔</span>
              </button>
              <button class="draft-tool" data-tool="fountain" title="钢笔">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
                <span>钢笔</span>
              </button>
              <button class="draft-tool" data-tool="marker" title="记号笔">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12l-7-7-7 7"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg>
                <span>记号笔</span>
              </button>
              <div class="draft-color-palette" id="draft-marker-colors">
                <button class="draft-color active" data-color="#FF5252" style="background:#FF5252"></button>
                <button class="draft-color" data-color="#448AFF" style="background:#448AFF"></button>
                <button class="draft-color" data-color="#69F0AE" style="background:#69F0AE"></button>
                <button class="draft-color" data-color="#FFD740" style="background:#FFD740"></button>
                <button class="draft-color" data-color="#E040FB" style="background:#E040FB"></button>
                <button class="draft-color" data-color="#FF6E40" style="background:#FF6E40"></button>
              </div>
              <button class="draft-tool" data-tool="eraser" title="橡皮擦">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H7L3 16C2 15 2 13 3 12L13 2L22 11L20 20Z"/><path d="M17 17L7 7"/></svg>
                <span>橡皮擦</span>
              </button>
              <button class="draft-tool" data-tool="cursor" title="光标">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
                <span>光标</span>
              </button>
            </div>
            <!-- UI页签 -->
            <div class="draft-toolbox-panel" data-panel="ui">
              <button class="draft-tool" data-tool="rect" title="矩形">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                <span>矩形</span>
              </button>
              <button class="draft-tool" data-tool="circle" title="圆形">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/></svg>
                <span>圆形</span>
              </button>
            </div>
            <!-- 工具页签 -->
            <div class="draft-toolbox-panel" data-panel="tools">
              <button class="draft-tool" data-tool="screenshot" title="截图">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                <span>截图</span>
              </button>
            </div>
          </div>
        </div>
        <!-- 可视化目录卡片 -->
        <div id="canvas-directory-card">
          <!-- 模式页签 -->
          <div class="canvas-directory-tabs">
            <button class="canvas-directory-tab active" data-mode="structure" id="dir-tab-structure" type="button">根据结构</button>
            <button class="canvas-directory-tab" data-mode="logic" id="dir-tab-logic" type="button">根据逻辑</button>
          </div>
          <div class="canvas-directory-header">
            <span class="canvas-directory-title">可视化目录</span>
            <button class="canvas-directory-status-btn" id="canvas-directory-status-btn" type="button" disabled>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              <span id="canvas-directory-status-text">未生成</span>
            </button>
          </div>
        </div>
        <svg id="workspace-canvas" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#999" />
            </marker>
          </defs>
          <g id="canvas-viewport"></g>
        </svg>
        <!-- 草稿画布（叠加在无限画布上方） -->
        <canvas id="draft-canvas"></canvas>
        <!-- 左下角缩放比例、回正和图例 -->
        <div id="canvas-controls">
          <button id="canvas-reset" title="一键回正" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="6" x2="12" y2="18"/>
              <line x1="6" y1="12" x2="18" y2="12"/>
            </svg>
          </button>
          <div id="canvas-scale">100%</div>
          <div id="canvas-legend">
            <div class="legend-item"><span class="legend-dot" style="background:#FF8C42"></span>文件夹</div>
            <div class="legend-item"><span class="legend-dot" style="background:#4CAF50"></span>文件</div>
          </div>
        </div>
      </div>
      <!-- 右侧悬浮按钮组（与AI对话区卡片同级高度） -->
      <div id="floating-actions">
        <button class="floating-btn active" id="btn-directory" title="目录" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>目录</span>
        </button>
        <button class="floating-btn" id="btn-draft" title="草稿" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          <span>草稿</span>
        </button>
        <button class="floating-btn" id="btn-repo" title="仓库" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
          <span>仓库</span>
        </button>
      </div>
      <!-- AI 对话卡片 -->
      <div id="chat-card">
        <!-- 卡片顶部工具栏 -->
        <div class="chat-toolbar">
          <div class="chat-toolbar-left">
            <button class="toolbar-btn" id="chat-history-dropdown" title="历史对话" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12h18M3 6h18M3 18h18"/>
              </svg>
            </button>
            <div class="toolbar-sep"></div>
            <div class="chat-history-list" id="chat-history-list">
              <span class="history-placeholder">暂无历史对话</span>
            </div>
          </div>
          <div class="chat-toolbar-right">
            <button class="toolbar-btn" id="chat-new-btn" title="新建对话" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
        <!-- 历史记录下拉面板 -->
        <div class="history-dropdown-panel" id="history-dropdown-panel">
          <div class="history-dropdown-header">历史对话记录</div>
          <div class="history-dropdown-list" id="history-dropdown-list"></div>
        </div>
        <!-- 分割线 -->
        <div class="chat-divider"></div>
        <!-- 对话消息区域 -->
        <div class="chat-messages" id="chat-messages">
          <div class="chat-welcome">
            <svg class="welcome-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="12" y1="8" x2="12" y2="8"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <div class="welcome-title">AI 专家团</div>
            <div class="welcome-desc">选择左侧项目开始对话，或点击下方输入框发送消息</div>
          </div>
        </div>
        <!-- 分割线 -->
        <div class="chat-divider"></div>
        <!-- 输入区域 -->
        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <textarea class="chat-input" id="chat-input" placeholder="输入消息..." rows="1"></textarea>
            <button class="chat-send-btn" id="chat-send-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <!-- 文件预览模式：左侧AI对话（复用主对话区位置） -->
      <div id="preview-chat-card" style="display:none;">
        <div class="chat-toolbar">
          <div class="chat-toolbar-left">
            <button class="toolbar-btn" id="preview-chat-history-dropdown" title="历史对话" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12h18M3 6h18M3 18h18"/>
              </svg>
            </button>
            <div class="toolbar-sep"></div>
            <div class="chat-history-list" id="preview-chat-history-list">
              <span class="history-placeholder">暂无历史对话</span>
            </div>
          </div>
          <div class="chat-toolbar-right">
            <button class="toolbar-btn" id="preview-chat-new-btn" title="新建对话" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="chat-divider"></div>
        <div class="chat-messages" id="preview-chat-messages">
          <div class="chat-welcome">
            <svg class="welcome-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <line x1="12" y1="8" x2="12" y2="8"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <div class="welcome-title">AI 专家团</div>
            <div class="welcome-desc">选择左侧项目开始对话，或点击下方输入框发送消息</div>
          </div>
        </div>
        <div class="chat-divider"></div>
        <div class="chat-input-area">
          <div class="chat-input-wrapper">
            <textarea class="chat-input" id="preview-chat-input" placeholder="输入消息..." rows="1"></textarea>
            <button class="chat-send-btn" id="preview-chat-send-btn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <!-- 文件预览模式：中间文件预览 -->
      <div id="file-preview-card" style="display:none;">
        <div class="file-preview-header">
          <span class="file-preview-title" id="file-preview-title">文件名</span>
          <div class="file-preview-tabs" id="file-preview-tabs" style="display:none;">
            <button class="preview-tab" data-tab="source" type="button">源码</button>
            <button class="preview-tab active" data-tab="preview" type="button">预览</button>
            <button class="preview-tab" data-tab="canvas" type="button">画布</button>
          </div>
          <div class="file-preview-lang" id="file-preview-lang" style="display:none;">
            <span class="lang-label" id="lang-label">TEXT</span>
          </div>
          <div class="file-preview-theme-toggle" id="file-preview-theme-toggle" style="display:none;" title="切换主题">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/>
              <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
            </svg>
          </div>
          <span class="file-preview-save-status" id="file-preview-save-status"></span>
          <button class="file-preview-back" id="file-preview-back" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H4"/></svg>
            返回
          </button>
        </div>
        <div class="file-preview-divider"></div>
        <div class="file-preview-body">
          <textarea class="file-preview-editor" id="file-preview-editor" spellcheck="false"></textarea>
          <div class="file-preview-highlight" id="file-preview-highlight"><pre><code id="highlight-code" class="hljs"></code></pre></div>
          <div class="file-preview-md" id="file-preview-md"></div>
          <div class="file-preview-image" id="file-preview-image"></div>
          <svg class="file-canvas-svg" id="file-canvas-svg" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <marker id="fc-arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 8 3, 0 6" fill="#999" />
              </marker>
            </defs>
            <g id="file-canvas-viewport"></g>
          </svg>
        </div>
      </div>
      <!-- ========== 设置页面 ========== -->
      <div id="settings-page">
        <div class="settings-sidebar">
          <button class="settings-back-btn" id="settings-back-btn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            <span>返回</span>
          </button>
          <nav class="settings-nav">
            <div class="settings-nav-item active" data-section="appearance">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
              </svg>
              <span>风格设置</span>
            </div>
            <div class="settings-nav-item" data-section="keys">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
              </svg>
              <span>密钥池配置</span>
            </div>
            <div class="settings-nav-item" data-section="experts">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
              <span>专家团配置</span>
            </div>
            <div class="settings-nav-item" data-section="about">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="16" x2="12" y2="12"/>
                <line x1="12" y1="8" x2="12.01" y2="8"/>
              </svg>
              <span>关于软件</span>
            </div>
          </nav>
        </div>
        <div class="settings-content">
          <!-- 风格设置 -->
          <section class="settings-section active" id="settings-appearance">
            <h2 class="settings-section-title">风格设置</h2>
            <div class="settings-row">
              <div class="settings-row-label">
                <span class="settings-row-title">深色模式</span>
                <span class="settings-row-desc">切换应用的明/暗主题外观</span>
              </div>
              <label class="settings-toggle">
                <input type="checkbox" id="settings-theme-toggle">
                <span class="settings-toggle-slider"></span>
              </label>
            </div>
          </section>
          <!-- 密钥池配置 -->
          <section class="settings-section" id="settings-keys">
            <h2 class="settings-section-title">密钥池配置</h2>
            <div class="keypool-tabs">
              <button class="keypool-tab active" data-keypool-tab="preset" type="button">预设厂商</button>
              <button class="keypool-tab" data-keypool-tab="relay" type="button">中转服务</button>
              <button class="keypool-tab" data-keypool-tab="custom" type="button">自定义代码</button>
            </div>
            <!-- 预设厂商 -->
            <div class="keypool-panel active" data-keypool-panel="preset">
              <div class="keypool-form">
                <div class="keypool-field">
                  <label class="keypool-label">厂商</label>
                  <select class="keypool-select" id="keypool-preset-provider">
                    <option value="deepseek">DeepSeek</option>
                    <option value="openai">OpenAI</option>
                    <option value="anthropic">Anthropic</option>
                    <option value="aliyun">阿里云</option>
                    <option value="tencent">腾讯云</option>
                  </select>
                </div>
                <div class="keypool-field">
                  <label class="keypool-label">模型</label>
                  <select class="keypool-select" id="keypool-preset-model"></select>
                </div>
                <div class="keypool-field">
                  <label class="keypool-label">API 密钥</label>
                  <input type="password" class="keypool-input" id="keypool-preset-key" placeholder="sk-...">
                </div>
                <button class="keypool-add-btn" id="keypool-preset-add" type="button">认证并添加</button>
              </div>
              <div class="keypool-list" id="keypool-preset-list"></div>
            </div>
            <!-- 中转服务 -->
            <div class="keypool-panel" data-keypool-panel="relay">
              <div class="keypool-form">
                <div class="keypool-field">
                  <label class="keypool-label">名称</label>
                  <input type="text" class="keypool-input" id="keypool-relay-name" placeholder="如：我的中转站">
                </div>
                <div class="keypool-field">
                  <label class="keypool-label">模型名称</label>
                  <input type="text" class="keypool-input" id="keypool-relay-model" placeholder="如：gpt-4o-mini">
                </div>
                <div class="keypool-field">
                  <label class="keypool-label">端点 URL</label>
                  <input type="text" class="keypool-input" id="keypool-relay-endpoint" placeholder="https://api.example.com/v1/chat/completions">
                </div>
                <div class="keypool-field">
                  <label class="keypool-label">API 密钥</label>
                  <input type="password" class="keypool-input" id="keypool-relay-key" placeholder="sk-...">
                </div>
                <button class="keypool-add-btn" id="keypool-relay-add" type="button">认证并添加</button>
              </div>
              <div class="keypool-list" id="keypool-relay-list"></div>
            </div>
            <!-- 自定义代码 -->
            <div class="keypool-panel" data-keypool-panel="custom">
              <div class="keypool-form">
                <div class="keypool-field">
                  <label class="keypool-label">名称</label>
                  <input type="text" class="keypool-input" id="keypool-custom-name" placeholder="如：自定义接口">
                </div>
                <div class="keypool-field">
                  <label class="keypool-label">接口代码</label>
                  <textarea class="keypool-textarea" id="keypool-custom-code" rows="8" placeholder="// 在此编写自定义接口代码...">// 示例：自定义 API 调用函数
// async function chat(messages) {
//   const response = await fetch('https://your-api.com/chat', {
//     method: 'POST',
//     headers: { 'Content-Type': 'application/json' },
//     body: JSON.stringify({ messages })
//   });
//   return response.json();
// }</textarea>
                </div>
                <button class="keypool-add-btn" id="keypool-custom-add" type="button">添加</button>
              </div>
              <div class="keypool-list" id="keypool-custom-list"></div>
            </div>
          </section>
          <!-- 专家团配置 -->
          <section class="settings-section" id="settings-experts">
            <h2 class="settings-section-title">专家团配置</h2>
            <div class="expert-grid expert-grid-special" id="expert-grid-special"></div>
            <hr class="expert-divider" />
            <div class="expert-grid expert-grid-regular" id="expert-grid-regular"></div>
          </section>
          <!-- 关于软件 -->
          <section class="settings-section" id="settings-about">
            <h2 class="settings-section-title">关于软件</h2>
            <div class="settings-about-info">
              <div class="settings-about-row">
                <span class="settings-about-label">开发者</span>
                <span class="settings-about-value">江仕玺</span>
              </div>
              <div class="settings-about-row">
                <span class="settings-about-label">版本</span>
                <span class="settings-about-value">0.1.0</span>
              </div>
            </div>
          </section>
        </div>
      </div>
      <!-- 仓库模式：中央 Wiki 面板 -->
      <div id="wiki-panel" style="display:none;">
        <div class="wiki-header">
          <span class="wiki-title" id="wiki-title">Wiki</span>
          <button class="wiki-back" id="wiki-back" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H4"/></svg>
            返回
          </button>
        </div>
        <div class="wiki-divider"></div>
        <div class="wiki-body" id="wiki-body">
          <!-- 文章视图 -->
          <div class="wiki-article" id="wiki-article"></div>
        </div>
        <!-- 迭代控制卡片（左下角悬浮） -->
        <div class="wiki-iteration-card" id="wiki-iteration-card">
          <div class="wiki-iteration-header">
            <span>迭代控制</span>
            <select class="wiki-iteration-mode" id="wiki-iteration-mode">
              <option value="manual">手动</option>
              <option value="self">自迭代</option>
              <option value="auto">自动迭代</option>
            </select>
          </div>
          <div class="wiki-iteration-status" id="wiki-iteration-status">就绪</div>
          <button class="wiki-iteration-btn" id="wiki-iteration-btn" type="button">执行迭代</button>
        </div>
      </div>

      <!-- 仓库模式：右侧仓库管理器 -->
      <div id="repo-browser" style="display:none;">
        <div class="repo-browser-header">
          <span class="repo-browser-title">仓库管理器</span>
        </div>
        <div class="repo-browser-divider"></div>
        <div class="repo-browser-list" id="repo-browser-list">
          <!-- 动态渲染，默认选中 Wiki -->
        </div>
      </div>

      <!-- 文件预览模式：右侧资源管理器 -->
      <div id="file-browser-card" style="display:none;">
        <div class="file-browser-header">
          <span class="file-browser-title">资源管理器</span>
          <button class="file-browser-refresh" id="file-browser-refresh" title="刷新" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
        </div>
        <div class="file-browser-divider"></div>
        <div class="file-browser-tree" id="file-browser-tree"></div>
      </div>
      <!-- 错误提示 Toast -->
      <div id="error-toast" class="error-toast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span id="error-toast-msg"></span>
      </div>
    </main>
  </body>
</html>
